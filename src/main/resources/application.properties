spring.application.name=smart-delivery-box

# --- CẤU HÌNH KẾT NỐI DATABASE (DOCKER) ---

# 1. Địa chỉ: localhost cổng 3306, Database tên là smartbox_db
spring.datasource.url=jdbc:mysql://localhost:3306/smart_box

# 2. Tài khoản: Khớp với lệnh docker run bạn vừa chạy (root / 1234)
spring.datasource.username=root
spring.datasource.password=1234

# 3. Cấu hình JPA (Tự động biến Class Java thành Bảng SQL)
# update: Tự động tạo bảng nếu chưa có
spring.jpa.hibernate.ddl-auto=update
# show-sql: Hiện câu lệnh SQL ra màn hình log để dễ kiểm tra
spring.jpa.show-sql=true
# dialect: Giúp Hibernate nói đúng "ngôn ngữ" của MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- CẤU HÌNH KẾT NỐI ESP32 ---
# Cổng COM của ESP32 (trên Windows: COM3, COM4, v.v. | trên Linux: /dev/ttyUSB0, v.v.)
# esp32.port=COM3
# Tốc độ truyền (baud rate) - phổ biến: 9600, 115200
# esp32.baudrate=115200

# --- CẤU HÌNH KẾT NỐI MQTT ---
mqtt.broker=tcp://localhost:1883
mqtt.clientId=smart-delivery-box
mqtt.topic.default=esp32/data
